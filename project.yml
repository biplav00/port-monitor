name: PortMonitor
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.portmonitor
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
targets:
  PortMonitor:
    type: application
    platform: macOS
    sources:
      - path: PortMonitor
    info:
      path: PortMonitor/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSHumanReadableCopyright: ""
    entitlements:
      path: PortMonitor/PortMonitor.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.portmonitor.PortMonitor
        PRODUCT_NAME: PortMonitor
        GENERATE_INFOPLIST_FILE: NO
  PortMonitorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PortMonitorTests
    dependencies:
      - target: PortMonitor
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/PortMonitor.app/Contents/MacOS/PortMonitor
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.portmonitor.PortMonitorTests
