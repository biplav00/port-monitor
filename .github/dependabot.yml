.github/dependabot.yml
        version: 2
        updates:
          - package-ecosystem: "pip"
            directory: "/"
            schedule:
              interval: "weekly"
              day: "monday"
              time: "09:00"
            open-pull-requests-limit: 3
            reviewers:
              - "biplav00"
            assignees:
              - "biplav00"
          - package-ecosystem: "github-actions"
            directory: "/"
            schedule:
              interval: "weekly"
              day: "monday"
              time: "09:00"
            open-pull-requests-limit: 3
