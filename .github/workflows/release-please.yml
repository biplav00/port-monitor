name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: python
          package-name: port-monitor
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-pull-request: true
          release-as: "0.4.0"

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies (including PyInstaller)
        run: uv sync --group dev

      - name: Build app
        run: ./packaging/build_dmg.sh

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag }}
          files: |
            packaging/dist/Port Monitor.dmg
          draft: false
          prerelease: false