name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies (including PyInstaller)
        run: uv sync --group dev

      - name: Build app
        run: ./packaging/build_dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Port-Monitor-DMG
          path: packaging/dist/Port\ Monitor.dmg